<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Detail</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.viewer{
  width:100%;
  aspect-ratio:5/3;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  border-radius:10px;
  position:relative;
}

.viewer img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.nav{
  position:absolute;
  top:50%;
  width:100%;
  display:flex;
  justify-content:space-between;
}

.nav button{
  background:rgba(0,0,0,0.5);
  border:none;
  color:#fff;
  font-size:20px;
  padding:10px;
}

.info{
  margin-top:20px;
  color:#ccc;
}
</style>

</head>

<body>

<div class="container">

  <div class="viewer">
    <div class="nav">
      <button onclick="prev()">‹</button>
      <button onclick="next()">›</button>
    </div>
    < img id="img">
  </div>

  <div class="info">
    <div id="title"></div>
    <div id="detail"></div>
  </div>

</div>

<script>

let data, item, imgs = [], i = 0;

async function load(){

  data = await (await fetch("photo.json")).json();

  const id = new URL(location.href).searchParams.get("id");

  item = data.find(x=>x.id == id);

  if(!item){
    document.body.innerHTML = "Not Found";
    return;
  }

  imgs = item.images || [];

  document.getElementById("title").innerText =
    item.airline + " | " + item.type;

  document.getElementById("detail").innerHTML =
    `机场：${item.airport}<br>日期：${item.date}`;

  show();
  setInterval(next,4000);
}

function show(){
  document.getElementById("img").src = imgs[i];
}

function next(){
  i = (i+1)%imgs.length;
  show();
}

function prev(){
  i = (i-1+imgs.length)%imgs.length;
  show();
}

load();

</script>

</body>
</html>
