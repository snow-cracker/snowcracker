<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SnowCracker Aviation Photos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">SnowCracker Aviation Photos</div>

<div class="searchBox">
  <input id="search" placeholder="搜索机型 / 航司 / 机场 / 日期">
</div>

<div class="categoryBar">
  <div class="category" onclick="toggle('model')">机型</div>
  <div class="category" onclick="toggle('airline')">航司</div>
  <div class="category" onclick="toggle('airport')">机场</div>
  <div class="category" onclick="toggle('date')">日期</div>
</div>

<div id="model" class="subMenu"></div>
<div id="airline" class="subMenu"></div>
<div id="airport" class="subMenu"></div>
<div id="date" class="subMenu"></div>

<div style="text-align:center;margin:20px;">
  <input type="file" id="files" multiple>
  <button onclick="upload()">上传</button>
</div>

<div class="grid" id="grid"></div>

<script src="app.js"></script>

</body>
</html>
